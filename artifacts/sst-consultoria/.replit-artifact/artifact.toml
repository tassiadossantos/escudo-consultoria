kind = "web"
previewPath = "/"
title = "Consultoria SST"
version = "1.0.0"
id = "artifacts/sst-consultoria"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21932
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/sst-consultoria run dev"

[services.env]
PORT = "21932"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/sst-consultoria", "run", "build"]
publicDir = "artifacts/sst-consultoria/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
