name: SST Frontend CI

on:
  pull_request:
    paths:
      - "artifacts/sst-consultoria/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/sst-frontend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "artifacts/sst-consultoria/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/sst-frontend-ci.yml"
  workflow_dispatch:

jobs:
  build-sst-frontend:
    name: Build SST Frontend
    runs-on: ubuntu-latest
    env:
      PORT: "5173"
      BASE_PATH: "/"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm --filter @workspace/sst-consultoria build
